<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PRO PROCURE | Business & Project Infrastructure</title>
  <meta name="description" content="Premium procurement for global business operations and project implementation." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #111827; /* Professional Navy Black */
      --muted: #64748b; /* Slate Gray */
      --brand: #2563eb; /* Trust Blue */
      --accent: #f8fafc; /* Fine line accent */
      --border: #e2e8f0; /* Ultra-thin borders */
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03);
      --radius: 4px; /* Professional sharp corners */
      --max: 1200px;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Fine Line Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      max-width: var(--max);
      margin: 0 auto;
      gap: 2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: fit-content;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--text);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    .brand h1 { font-size: 1.25rem; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
    .brand p { margin: 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    .search-container {
      flex: 1;
      max-width: 600px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--accent);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 6px;
    }

    .search-box input {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.9rem;
      color: var(--text);
    }

    /* Main Layout */
    .wrap { max-width: var(--max); margin: 0 auto; padding: 2rem; }

    /* Hero Section */
    .hero {
      padding: 4rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .hero h2 { font-size: 2.5rem; font-weight: 600; margin: 0 0 1rem; letter-spacing: -1px; }
    .hero p { font-size: 1.125rem; color: var(--muted); max-width: 600px; margin: 0; }

    /* Modern Category Pills */
    .filter-nav {
      display: flex;
      gap: 0.5rem;
      margin: 2rem 0;
      overflow-x: auto;
      padding-bottom: 1rem;
      scrollbar-width: none;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.5rem 1.25rem;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      color: var(--muted);
    }

    .filter-btn.active {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    /* Product Grid with Fine Lines */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }

    .img-box {
      aspect-ratio: 1/1;
      padding: 2rem;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .img-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-body {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card-cat {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--brand);
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-action {
      margin-top: auto;
      display: flex;
      gap: 0.5rem;
    }

    .btn-main {
      flex: 1;
      background: var(--text);
      color: white;
      text-align: center;
      padding: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: 4px;
    }

    .btn-copy {
      background: var(--accent);
      border: 1px solid var(--border);
      padding: 0.75rem;
      border-radius: 4px;
      cursor: pointer;
    }

    footer {
      margin-top: 5rem;
      padding: 4rem 2rem;
      background: var(--accent);
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      color: var(--muted);
    }

    .footer-content {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      font-size: 0.875rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 1.75rem; }
      .topbar { flex-direction: column; align-items: stretch; gap: 1rem; }
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo-mark">P</div>
        <div>
          <h1 id="siteName">PRO PROCURE</h1>
          <p id="siteTagline">Global Project Infrastructure</p>
        </div>
      </div>
      <div class="search-container">
        <div class="search-box">
          <input type="text" id="q" placeholder="Search infrastructure, energy resilience, or professional tools...">
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h2>Professional Grade <br>Project Essentials</h2>
      <p>A curated selection of high-end business items and project infrastructure for modern operations worldwide.</p>
      
      <nav class="filter-nav" id="catsRow"></nav>
    </section>

    <div id="grid" class="grid"></div>
  </main>

  <footer>
    <div class="footer-content">
      <div>
        <strong id="footerName">PRO PROCURE</strong><br>
        © <span id="year"></span> | Industrial & Project Procurement.
      </div>
      <div style="max-width: 400px;">
        <p id="disclosureText" style="margin: 0;"></p>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast">Link copied</div>

  <script>
    // --- Configuration ---
    const CONFIG = {
      name: "PRO PROCURE",
      tagline: "Infrastructure. Energy. Production. Security.",
      disclosure: "Affiliate Disclosure: As an Amazon Associate, we earn from qualifying purchases at no extra cost to you.",
      categories: [
        "All", 
        "Operational Infrastructure", 
        "Energy & Connectivity", 
        "Implementation Tools", 
        "Safety & Maintenance",
        "Strategy & Growth"
      ]
    };

    // --- State Management ---
    let products = [];
    let activeCat = "All";
    let query = "";

    // --- Selectors ---
    const $ = (s) => document.querySelector(s);
    const grid = $("#grid");
    const catsRow = $("#catsRow");

    // --- Logic ---
    function renderCats() {
      catsRow.innerHTML = CONFIG.categories.map(c => `
        <button class="filter-btn ${c === activeCat ? 'active' : ''}" onclick="setCategory('${c}')">
          ${c}
        </button>
      `).join('');
    }

    window.setCategory = (c) => {
      activeCat = c;
      renderCats();
      renderGrid();
    };

    function showToast(msg) {
      const t = $("#toast");
      t.textContent = msg;
      t.style.opacity = 1;
      setTimeout(() => t.style.opacity = 0, 2000);
    }

    window.copyLink = (url) => {
      navigator.clipboard.writeText(url);
      showToast("Link copied to clipboard ✅");
    };

    function renderGrid() {
      const q = query.toLowerCase();
      const filtered = products.filter(p => {
        const matchesCat = activeCat === "All" || p.category === activeCat;
        const matchesQuery = p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
        return matchesCat && matchesQuery;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--muted); border: 1px dashed var(--border);">No items found in this category.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="img-box">
            <img src="${p.imageUrl}" alt="${p.title}" loading="lazy">
          </div>
          <div class="card-body">
            <div class="card-cat">${p.category}</div>
            <h3 class="card-title">${p.title}</h3>
            <p class="card-desc">${p.desc}</p>
            <div class="card-action">
              <a href="${p.link}" target="_blank" class="btn-main">View on Amazon</a>
              <button class="btn-copy" onclick="copyLink('${p.link}')" title="Copy Link">
                📋
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // --- Initialization ---
    async function init() {
      // Set UI Text
      $("#siteName").textContent = CONFIG.name;
      $("#footerName").textContent = CONFIG.name;
      $("#siteTagline").textContent = CONFIG.tagline;
      $("#disclosureText").textContent = CONFIG.disclosure;
      $("#year").textContent = new Date().getFullYear();

      // Setup Search
      $("#q").addEventListener("input", (e) => {
        query = e.target.value;
        renderGrid();
      });

      // Load Products
      try {
        const res = await fetch('products.json');
        if (res.ok) {
          products = await res.json();
        } else {
          // Fallback sample data if file not found
          products = [
            {
              title: "Portable Solar Station 2000W",
              category: "Energy & Connectivity",
              desc: "Critical power resilience for remote project sites and field operations.",
              link: "#",
              imageUrl: "https://m.media-amazon.com/images/I/71Y+O-kZ7DL._AC_SL1500_.jpg"
            },
            {
              title: "Ergonomic Mesh Task Chair",
              category: "Operational Infrastructure",
              desc: "BIFMA certified seating for high-productivity business environments.",
              link: "#",
              imageUrl: "https://m.media-amazon.com/images/I/718yTEtHltL._AC_SL1500_.jpg"
            }
          ];
        }
      } catch (e) {
        console.error("Error loading products", e);
      }

      renderCats();
      renderGrid();
    }

    init();
  </script>
</body>
</html>
